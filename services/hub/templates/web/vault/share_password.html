<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Password-protected Pi Thread Vault share.">
  <meta property="og:site_name" content="jonaylor.com">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Password-protected Pi Thread Vault share">
  <meta property="og:description" content="Open a shared Pi Thread Vault session.">
  <meta property="og:image" content="/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#0f1115">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Password required · Pi Thread Vault</title>
  <style>{% include "web/_admin_styles.css" %}</style>
</head>
<body class="pi-session-view pi-standard-page">
  <header>
    <h1>shared thread</h1>
  </header>
  <main>
    <section class="card narrow">
      <h2>Password required</h2>
      {% match error %}{% when Some with (message) %}<p class="warning">{{ message }}</p>{% when None %}{% endmatch %}
      <form method="post" action="/s/{{ share_token }}">
        <label>Password <input type="password" name="password" autofocus></label>
        <button type="submit">Open thread</button>
      </form>
    </section>
  </main>
</body>
</html>
