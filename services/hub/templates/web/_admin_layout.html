<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Private jonaylor.com admin tools and Pi Thread Vault sessions.">
  <meta property="og:site_name" content="jonaylor.com">
  <meta property="og:type" content="website">
  <meta property="og:title" content="jonaylor.com admin">
  <meta property="og:description" content="Private admin tools and Pi Thread Vault sessions.">
  <meta property="og:image" content="/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#0f1115">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>{% block title %}Admin{% endblock %} · jonaylor.com</title>
  <style>{% include "web/_admin_styles.css" %}</style>
  {% block head_extra %}{% endblock %}
</head>
<body class="pi-session-view pi-standard-page">
  <header>
    <h1>jonaylor.com admin</h1>
    <nav class="admin-nav">
      <a href="/admin/dashboard">dashboard</a>
      <a href="/admin/newsletters">newsletters</a>
      <a href="/admin/pastebin">pastebin</a>
      <a href="/admin/threads">threads</a>
      <a href="/admin/vault/search">search</a>
      <form class="nav-account" action="/admin/logout" method="post">
        <button type="submit">logout</button>
      </form>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
