<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Private jonaylor.com admin login.">
  <meta name="theme-color" content="#0f1115">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Login · jonaylor.com</title>
  <style>{% include "web/_admin_styles.css" %}</style>
  <style>
    .login-panel { max-width: 28rem; }
  </style>
</head>
<body class="pi-session-view pi-standard-page">
  <header>
    <h1>jonaylor.com hub</h1>
    <nav class="admin-nav">
      <a href="/">hub</a>
      <a href="https://www.jonaylor.com/">main site</a>
      <a href="https://www.jonaylor.com/newsletter/">newsletter</a>
    </nav>
  </header>
  <main>
    <h1>Sign in</h1>
    <p class="muted">Admin access for newsletter and private tools.</p>

    <section class="card login-panel">
      <h2>admin login</h2>
      <div class="flash-messages">
        {% for message in flash_messages %}
          <div class="flash-message">{{ message.content }}</div>
        {% endfor %}
      </div>
      <form action="/login" method="post" class="stacked">
        <label>Username
          <input type="text" placeholder="username" name="username" required autofocus>
        </label>
        <label>Password
          <input type="password" placeholder="password" name="password" required>
        </label>
        <div><button type="submit">Sign in</button></div>
      </form>
    </section>
  </main>
</body>
</html>
